<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>__GENERAL_PCA_3D_TITLE__</title>
<style>
  :root {
    color-scheme: light;
  }
  html, body {
    height: 100%;
  }
  body {
    font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    background: #f5f6f8;
    color: #1a1a1a;
    display: flex;
    flex-direction: column;
  }
  header {
    flex: 0 0 auto;
    box-sizing: border-box;
    padding: 16px 24px;
    background: #2c3e50;
    color: #fff;
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 18px;
  }
  header p {
    margin: 0;
    font-size: 13px;
    color: #cbd5e1;
  }
  #main {
    flex: 1 1 auto;
    position: relative;
    overflow: hidden;
  }
  #scene {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    cursor: grab;
  }
  #scene.dragging {
    cursor: grabbing;
  }
  #variance {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(255,255,255,0.92);
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 11px;
    color: #333;
    line-height: 1.5;
  }
  #legend {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(255,255,255,0.92);
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    max-height: 70%;
    overflow-y: auto;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  #legend .legend-title {
    font-weight: 600;
    margin-bottom: 6px;
  }
  #legend .legend-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 3px 0;
  }
  #legend .swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex: 0 0 auto;
  }
  #hint {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(255,255,255,0.9);
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    color: #555;
  }
  #tooltip {
    position: absolute;
    pointer-events: none;
    background: #1a1a1a;
    color: #fff;
    font-size: 12px;
    padding: 6px 8px;
    border-radius: 4px;
    max-width: 260px;
    display: none;
    z-index: 50;
  }
</style>
</head>
<body>
<header>
  <h1 id="page-title">__GENERAL_PCA_3D_TITLE__</h1>
  <p>Drag to rotate, scroll to zoom.</p>
</header>
<div id="main">
  <canvas id="scene"></canvas>
  <div id="variance"></div>
  <div id="legend"></div>
  <div id="hint">Drag: rotate &middot; Scroll: zoom</div>
  <div id="tooltip"></div>
</div>
<script id="pca-3d-data" type="application/json">__GENERAL_PCA_3D_DATA__</script>
<script>
(function () {
  var payload = JSON.parse(document.getElementById("pca-3d-data").textContent);
  var species = payload.species;
  var groups = payload.groups;
  var meta = payload.meta;

  document.title = meta.title;
  document.getElementById("page-title").textContent = meta.title;

  var varianceEl = document.getElementById("variance");
  var ev = meta.explained_variance || [];
  varianceEl.innerHTML = "Explained variance<br>" +
    ev.map(function (v, i) { return "PC" + (i + 1) + ": " + (v * 100).toFixed(1) + "%"; }).join("<br>");

  var legendEl = document.getElementById("legend");
  var legendHtml = "<div class=\"legend-title\">Groups</div>";
  Object.keys(groups).sort().forEach(function (g) {
    legendHtml += "<div class=\"legend-row\"><span class=\"swatch\" style=\"background:" + groups[g] + "\"></span>" + g + "</div>";
  });
  legendEl.innerHTML = legendHtml;

  var canvas = document.getElementById("scene");
  var ctx = canvas.getContext("2d");
  var main = document.getElementById("main");
  var tooltip = document.getElementById("tooltip");

  var dpr = window.devicePixelRatio || 1;

  function resize() {
    var rect = main.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    render();
  }
  window.addEventListener("resize", resize);

  // Normalize coordinates into a roughly [-1, 1] cube so the zoom/rotation
  // math stays independent of the raw PCA units.
  var maxAbs = 0;
  species.forEach(function (s) {
    maxAbs = Math.max(maxAbs, Math.abs(s.pc1), Math.abs(s.pc2), Math.abs(s.pc3));
  });
  maxAbs = maxAbs || 1;

  var points = species.map(function (s) {
    return {
      x: s.pc1 / maxAbs,
      y: s.pc2 / maxAbs,
      z: s.pc3 / maxAbs,
      name: s.name,
      group: s.group,
      color: groups[s.group] || "#888888",
      pc1: s.pc1,
      pc2: s.pc2,
      pc3: s.pc3,
    };
  });

  var yaw = 0.6;      // radians; initial angle so the cloud isn't viewed edge-on
  var pitch = -0.35;
  var zoom = 1;
  var focal = 3.2;    // perspective strength; bigger = flatter (less distortion)
  var baseRadius = 220;
  var baseDotR = 4.5;

  var dragging = false;
  var lastX = 0, lastY = 0;
  var lastProjected = [];

  function rotatePoint(p) {
    // Yaw around the Y axis
    var cosY = Math.cos(yaw), sinY = Math.sin(yaw);
    var x1 = p.x * cosY + p.z * sinY;
    var z1 = -p.x * sinY + p.z * cosY;
    var y1 = p.y;
    // Pitch around the X axis
    var cosX = Math.cos(pitch), sinX = Math.sin(pitch);
    var y2 = y1 * cosX - z1 * sinX;
    var z2 = y1 * sinX + z1 * cosX;
    return { x: x1, y: y2, z: z2 };
  }

  function render() {
    var rect = main.getBoundingClientRect();
    var cx = rect.width / 2;
    var cy = rect.height / 2;
    ctx.clearRect(0, 0, rect.width, rect.height);

    // Rotated axis guides through the origin, for orientation.
    var axes = [
      { x: 1, y: 0, z: 0, label: "PC1", color: "#4C9BE8" },
      { x: 0, y: 1, z: 0, label: "PC2", color: "#E8604C" },
      { x: 0, y: 0, z: 1, label: "PC3", color: "#F5A623" },
    ];

    var projectedPoints = points.map(function (p) {
      var r = rotatePoint(p);
      var scale = focal / (focal + r.z);
      return {
        sx: cx + r.x * baseRadius * zoom * scale,
        sy: cy - r.y * baseRadius * zoom * scale,
        depth: r.z,
        scale: scale,
        point: p,
      };
    });

    // Painter's algorithm: draw far points first so nearer points overlap them.
    projectedPoints.sort(function (a, b) { return a.depth - b.depth; });

    var origin = rotatePoint({ x: 0, y: 0, z: 0 });
    var s0 = focal / (focal + origin.z);
    var x0 = cx + origin.x * baseRadius * zoom * s0;
    var y0 = cy - origin.y * baseRadius * zoom * s0;

    axes.forEach(function (ax) {
      var r1 = rotatePoint({ x: ax.x, y: ax.y, z: ax.z });
      var s1 = focal / (focal + r1.z);
      var x1 = cx + r1.x * baseRadius * zoom * s1 * 1.15;
      var y1 = cy - r1.y * baseRadius * zoom * s1 * 1.15;
      ctx.strokeStyle = ax.color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.stroke();
      ctx.fillStyle = ax.color;
      ctx.font = "12px -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif";
      ctx.fillText(ax.label, x1 + 4, y1);
    });

    projectedPoints.forEach(function (pp) {
      var r = Math.max(1.5, baseDotR * pp.scale * zoom);
      ctx.beginPath();
      ctx.fillStyle = pp.point.color;
      ctx.globalAlpha = Math.min(1, Math.max(0.35, pp.scale));
      ctx.arc(pp.sx, pp.sy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    lastProjected = projectedPoints;
  }

  canvas.addEventListener("mousedown", function (evt) {
    dragging = true;
    lastX = evt.clientX;
    lastY = evt.clientY;
    canvas.classList.add("dragging");
    tooltip.style.display = "none";
  });

  window.addEventListener("mousemove", function (evt) {
    if (!dragging) {
      handleHover(evt);
      return;
    }
    var dx = evt.clientX - lastX;
    var dy = evt.clientY - lastY;
    lastX = evt.clientX;
    lastY = evt.clientY;
    yaw += dx * 0.008;
    pitch += dy * 0.008;
    var limit = Math.PI / 2 - 0.05;
    pitch = Math.max(-limit, Math.min(limit, pitch));
    render();
  });

  window.addEventListener("mouseup", function () {
    dragging = false;
    canvas.classList.remove("dragging");
  });

  canvas.addEventListener("wheel", function (evt) {
    evt.preventDefault();
    var factor = evt.deltaY < 0 ? 1.08 : 1 / 1.08;
    zoom = Math.max(0.2, Math.min(6, zoom * factor));
    render();
  }, { passive: false });

  function handleHover(evt) {
    var rect = canvas.getBoundingClientRect();
    var mx = evt.clientX - rect.left;
    var my = evt.clientY - rect.top;
    var best = null;
    var bestDist = 14; // px hit-radius
    lastProjected.forEach(function (pp) {
      var d = Math.hypot(pp.sx - mx, pp.sy - my);
      if (d < bestDist) {
        bestDist = d;
        best = pp;
      }
    });
    if (best) {
      tooltip.style.display = "block";
      tooltip.style.left = (mx + 14) + "px";
      tooltip.style.top = (my + 14) + "px";
      tooltip.innerHTML = "<strong>" + best.point.name + "</strong><br>" +
        best.point.group + "<br>" +
        "PC1: " + best.point.pc1.toFixed(2) + " &middot; PC2: " + best.point.pc2.toFixed(2) + " &middot; PC3: " + best.point.pc3.toFixed(2);
    } else {
      tooltip.style.display = "none";
    }
  }

  resize();
})();
</script>
</body>
</html>
