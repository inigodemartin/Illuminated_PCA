<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>__INTERACTIVE_GO_TREE_TITLE__</title>
<style>
  :root {
    color-scheme: light;
  }
  body {
    font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    background: #f5f6f8;
    color: #1a1a1a;
  }
  header {
    padding: 16px 24px;
    margin-right: 260px;
    background: #2c3e50;
    color: #fff;
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 18px;
  }
  header p {
    margin: 0;
    font-size: 13px;
    color: #cbd5e1;
  }
  #tree-toolbar {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
  }
  #species-search-wrap {
    position: relative;
    flex: 1 1 320px;
    max-width: 420px;
  }
  #species-search-input {
    width: 100%;
    box-sizing: border-box;
    padding: 5px 8px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.92);
    color: #1a1a1a;
    font-size: 12px;
  }
  #species-search-suggestions {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    margin-top: 2px;
    background: #fff;
    border: 1px solid #cbd5e1;
    border-radius: 4px;
    max-height: 260px;
    overflow-y: auto;
    z-index: 700;
    box-shadow: 0 4px 10px rgba(0,0,0,0.18);
  }
  #species-search-suggestions.hidden {
    display: none;
  }
  .go-suggestion {
    padding: 5px 8px;
    font-size: 12px;
    color: #1a1a1a;
    cursor: pointer;
    border-bottom: 1px solid #eef1f5;
  }
  .go-suggestion:last-child {
    border-bottom: none;
  }
  .go-suggestion:hover {
    background: #eef2ff;
  }
  .go-suggestion-id {
    font-weight: 600;
    margin-right: 6px;
  }
  .go-suggestion-desc {
    color: #64748b;
  }
  #species-search-status {
    margin: 6px 0 0;
    font-size: 12px;
    color: #cbd5e1;
    min-height: 14px;
  }
  #species-search-status.active {
    color: #fbbf24;
    font-weight: 600;
  }
  #species-search-status.error {
    color: #fca5a5;
    font-weight: 600;
  }
  circle.species-highlighted {
    filter: drop-shadow(0 0 4px rgba(245, 166, 35, 0.95));
  }
  .toolbar-btn {
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-radius: 4px;
    font-size: 12px;
    padding: 4px 10px;
  }
  .toolbar-btn:hover {
    background: rgba(255,255,255,0.22);
  }
  #sidebar {
    position: fixed;
    top: 0;
    right: 0;
    width: 250px;
    height: 100vh;
    overflow-y: auto;
    background: #f8fafc;
    border-left: 1px solid #cbd5e1;
    box-shadow: -2px 0 8px rgba(0,0,0,0.06);
    padding: 16px;
    box-sizing: border-box;
    z-index: 600;
  }
  .sidebar-section {
    margin-bottom: 22px;
  }
  .sidebar-section h4 {
    margin: 0 0 8px;
    font-size: 12px;
    color: #334155;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  #tree-container {
    position: relative;
    margin-right: 260px;
    padding: 32px 24px 60px;
    overflow-x: auto;
  }
  #connector-overlay {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
  }
  .level-row {
    position: relative;
    z-index: 1;
  }
  .node-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    margin-bottom: 12px;
  }
  .node-box {
    width: 200px;
    border: 1px solid #94a3b8;
    border-radius: 6px;
    background: #6FACE8;
    padding: 8px 10px;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    user-select: none;
  }
  .node-box.root {
    background: #ffffcc;
    border-color: #d4d400;
  }
  .node-box.expanded {
    outline: 2px solid #2c3e50;
  }
  .node-box .go-id {
    font-weight: 600;
    font-size: 13px;
  }
  .node-box .go-desc {
    font-size: 11px;
    color: #1f2937;
    margin-top: 2px;
  }
  .node-box .go-ic {
    font-size: 10px;
    color: #475569;
    margin-top: 2px;
  }
  .panel-zone {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    /* flex-start, not center: centering a row that overflows would
       overflow equally on both sides, and the left-side overflow becomes
       unreachable by scrolling (scrollLeft can't go negative) -- panels
       would visually get cut off with no way to scroll to them. */
    justify-content: flex-start;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 16px;
  }
  .panel {
    background: #fff;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    padding: 12px 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    /* Fixed, not shrinkable: with several panels sharing one nowrap row,
       letting them shrink-to-fit gave different panels different widths
       once some hit their min-width floor and others didn't. Every panel
       is always exactly this size; #tree-container scrolls horizontally
       instead of squeezing panels down to fit. */
    flex: 0 0 480px;
  }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .panel-header h3 {
    margin: 0;
    font-size: 14px;
  }
  .ic-tag {
    font-weight: normal;
    font-size: 12px;
    color: #64748b;
  }
  .panel-header-buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
  }
  .panel-reset {
    cursor: pointer;
    border: 1px solid #cbd5e1;
    background: #f8fafc;
    border-radius: 4px;
    font-size: 11px;
    padding: 2px 8px;
    color: #334155;
  }
  .panel-reset:hover {
    background: #e2e8f0;
  }
  .legend-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }
  .legend-action {
    cursor: pointer;
    border: 1px solid #cbd5e1;
    background: #f8fafc;
    border-radius: 4px;
    font-size: 11px;
    padding: 2px 8px;
    color: #334155;
  }
  .legend-action:hover {
    background: #e2e8f0;
  }
  .threshold-rail {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 30px;
    flex: 0 0 auto;
    gap: 4px;
  }
  .threshold-rail-input {
    width: 28px;
    padding: 1px 2px;
    border: 1px solid #e2e8f0;
    border-radius: 3px;
    font-size: 10px;
    text-align: center;
    color: #94a3b8;
    background: #fbfcfd;
  }
  .threshold-rail-input:hover,
  .threshold-rail-input:focus {
    color: #334155;
    border-color: #94a3b8;
  }
  .threshold-rail-input::-webkit-inner-spin-button,
  .threshold-rail-input::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .threshold-rail-track {
    position: relative;
    width: 4px;
    flex: 1 1 auto;
    margin: 2px 0;
    background: #e6eaf0;
    border-radius: 2px;
  }
  .threshold-rail-fill {
    position: absolute;
    left: 0;
    width: 100%;
    background: #b9c3cf;
    border-radius: 2px;
  }
  .threshold-rail-handle {
    position: absolute;
    left: 50%;
    top: 0;
    width: 11px;
    height: 11px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: #94a3b8;
    border: 1.5px solid #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.18);
    cursor: grab;
  }
  .threshold-rail-handle:hover {
    background: #64748b;
  }
  .threshold-rail-handle:active {
    cursor: grabbing;
    background: #2c3e50;
  }
  .panel-close {
    cursor: pointer;
    border: none;
    background: none;
    font-size: 16px;
    color: #64748b;
  }
  .plot-row {
    display: flex;
    align-items: stretch;
    gap: 2px;
  }
  .axis-label-y {
    width: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .axis-label-y span {
    display: inline-block;
    transform: rotate(-90deg);
    white-space: nowrap;
    font-size: 11px;
    color: #555;
  }
  .axis-label-x {
    text-align: center;
    font-size: 11px;
    color: #555;
    margin-top: 2px;
  }
  .panel-hint {
    text-align: center;
    font-size: 10px;
    color: #94a3b8;
    margin-top: 4px;
  }
  .scatter {
    width: 100%;
    height: auto;
    display: block;
    flex: 1 1 auto;
    min-width: 0;
    cursor: grab;
    touch-action: none;
  }
  .scatter.panning {
    cursor: grabbing;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 12px;
    margin-bottom: 6px;
  }
  .legend label {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  .legend .swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  .loading-pc-label {
    font-size: 11px;
    font-weight: 600;
    color: #334155;
    margin: 10px 0 4px;
  }
  .loading-pc-label:first-child {
    margin-top: 0;
  }
  .loading-row {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 6px;
    padding: 3px 0;
    border-bottom: 1px solid #eef1f5;
    font-size: 11px;
  }
  .loading-go {
    font-weight: 600;
    color: #1f2937;
  }
  .loading-value {
    color: #64748b;
    font-family: monospace;
  }
  .loading-desc {
    flex: 1 1 100%;
    color: #64748b;
  }
  .scatter circle {
    transition: opacity 0.1s;
  }
  .axis-line {
    stroke: #9ca3af;
    stroke-dasharray: 4 3;
    stroke-width: 1;
  }
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(15, 23, 42, 0.92);
    color: #fff;
    padding: 6px 9px;
    border-radius: 4px;
    font-size: 12px;
    line-height: 1.45;
    z-index: 1000;
    max-width: 240px;
  }
  #tooltip.hidden {
    display: none;
  }
  #species-modal {
    position: fixed;
    inset: 0;
    z-index: 1200;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #species-modal.hidden {
    display: none;
  }
  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
  }
  .modal-dialog {
    position: relative;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
    width: 700px;
    max-width: 95vw;
    max-height: 82vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid #e2e8f0;
    background: #2c3e50;
    color: #fff;
  }
  .modal-header-title {
    font-size: 14px;
    font-weight: 600;
  }
  .modal-header-sub {
    font-size: 11px;
    color: #cbd5e1;
    margin-top: 2px;
  }
  #modal-close {
    background: none;
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    padding: 0 4px;

    flex: 1 1 auto;
    overflow-y: auto;
    padding: 16px 18px;
    display: flex;
    gap: 24px;

  .modal-pc-section {
    flex: 1 1 0;
    min-width: 0;
  }
  .modal-pc-label {
    font-size: 12px;
    font-weight: 700;
    color: #1e293b;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 2px solid #e2e8f0;
  }
  .modal-direction-label {
    font-size: 10px;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin: 8px 0 3px;
  }
  .modal-contrib-row {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 4px 6px;
    padding: 3px 0;
    border-bottom: 1px solid #f1f5f9;
    font-size: 11px;
  }
  .modal-contrib-go {
    font-weight: 600;
    color: #1f2937;
    white-space: nowrap;
  }
  .modal-contrib-value {
    font-family: monospace;
    color: #64748b;
    white-space: nowrap;
  }
  .modal-contrib-desc {
    flex: 1 1 100%;
    color: #64748b;
    font-size: 10px;
  }
</style>

<body>
<header>
  <h1 id="page-title"></h1>
  <p id="page-subtitle"></p>
  <div id="tree-toolbar">
    <button id="expand-all-btn" class="toolbar-btn">Expand all PCAs</button>
    <button id="collapse-all-btn" class="toolbar-btn">Collapse all PCAs</button>
    <button id="download-tree-btn" class="toolbar-btn">Download tree PNG</button>
    <div id="species-search-wrap">
      <input id="species-search-input" type="text" autocomplete="off" placeholder="Search a species to highlight...">
      <div id="species-search-suggestions" class="hidden"></div>
    </div>
    <button id="species-search-clear-btn" class="toolbar-btn">Clear species</button>
  </div>
  <p id="species-search-status"></p>
</header>
<div id="sidebar">
  <div class="sidebar-section">
    <h4>Taxonomic groups</h4>
    <div class="legend-actions">
      <button id="sidebar-select-all" class="legend-action">Select all</button>
      <button id="sidebar-select-none" class="legend-action">Select none</button>
    </div>
    <div id="sidebar-legend" class="legend"></div>
  </div>
  <div class="sidebar-section">
    <h4>Top GO terms per PC</h4>
    <div id="sidebar-top-loadings"></div>
  </div>
</div>
<div id="tree-container">
  <svg id="connector-overlay"></svg>
</div>
<div id="species-modal" class="hidden">
  <div class="modal-backdrop"></div>
  <div class="modal-dialog">
    <div class="modal-header">
      <div>
        <div class="modal-header-title" id="modal-species-name"></div>
        <div class="modal-header-sub" id="modal-species-sub"></div>
      </div>
      <button id="modal-close">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<div id="tooltip" class="hidden"></div>

<script id="go-tree-data" type="application/json">__INTERACTIVE_GO_TREE_DATA__</script>
<script>
(function () {
  "use strict";

  var DATA = JSON.parse(document.getElementById("go-tree-data").textContent);

  var container = document.getElementById("tree-container");
  var overlay = document.getElementById("connector-overlay");
  var tooltip = document.getElementById("tooltip");

  document.getElementById("page-title").textContent =
    "GO " + (DATA.meta.mode === "descendants" ? "descendants" : "ancestors") + " tree: " + DATA.meta.root;
  document.getElementById("page-subtitle").textContent =
    DATA.tree.nodes.length + " nodes, " + DATA.species.length + " species" +
    (DATA.meta.count_descendants ? " (counts include descendant GO terms)" : "") +
    (DATA.meta.ic_threshold !== null && DATA.meta.ic_threshold !== undefined ? "  ·  IC ≥ " + DATA.meta.ic_threshold : "");

  var nodesById = {};
  DATA.tree.nodes.forEach(function (n) { nodesById[n.go_id] = n; });

  // GO descriptions for whichever terms show up in the per-species PC
  // contributions modal -- a small, purpose-built map (not the full-matrix
  // GO search payload general_pca_abundance.py ships, which this tool
  // deliberately doesn't include).
  var CONTRIB_GO_DESC = DATA.contrib_go_desc || {};

  var ALL_GROUPS = (function () {
    var present = {};
    DATA.species.forEach(function (s) { present[s.group] = true; });
    return Object.keys(present).sort();
  })();

  function formatIc(ic) {
    return (ic === null || ic === undefined) ? "n/a" : ic.toFixed(2);
  }

  function formatLoading(v) {
    return (v >= 0 ? "+" : "") + v.toFixed(4);
  }

  // ---- shared PCA axis range (identical for every node) ----
  var xs = DATA.species.map(function (s) { return s.pc1; });
  var ys = DATA.species.map(function (s) { return s.pc2; });
  var xMin = Math.min.apply(null, xs), xMax = Math.max.apply(null, xs);
  var yMin = Math.min.apply(null, ys), yMax = Math.max.apply(null, ys);
  var xPad = (xMax - xMin) * 0.08 || 1, yPad = (yMax - yMin) * 0.08 || 1;
  xMin -= xPad; xMax += xPad; yMin -= yPad; yMax += yPad;

  var PLOT_W = 620, PLOT_H = 420;
  var MIN_RADIUS = 2.2, MAX_RADIUS = 7;
  var BASE_STROKE_WIDTH = 0.4;
  // How far you can zoom in: a *static* zoom (everything, dots included,
  // scaling up by the same factor) never separates two points that sit
  // close together in data space -- the gap between their centers and
  // their own size grow at the identical rate, so the overlap ratio never
  // changes no matter how far you zoom. Letting the viewBox shrink this
  // far, combined with counter-scaling marker radius back down on every
  // zoom step (see updateMarkerScale), is what actually lets a dense
  // cluster pull apart under zoom.
  var MIN_VIEW_FRACTION = 1 / 8000;
  // Dots grow by up to this fraction of their original screen size as you
  // zoom in, saturating within the first few zoom steps and then staying
  // flat -- a little bigger at depth, without the growth running away
  // (and eating back the separating power) at extreme zoom. 0 would keep
  // dots a perfectly constant screen size at any zoom.
  var MARKER_ZOOM_GROWTH = 0.4;
  function scaleX(v) { return ((v - xMin) / (xMax - xMin)) * PLOT_W; }
  function scaleY(v) { return PLOT_H - ((v - yMin) / (yMax - yMin)) * PLOT_H; }

  var EXPLAINED = DATA.meta.explained_variance || [0, 0];
  var PC1_LABEL = "PC1 (" + (EXPLAINED[0] * 100).toFixed(1) + "% variance)";
  var PC2_LABEL = "PC2 (" + (EXPLAINED[1] * 100).toFixed(1) + "% variance)";

  // ---- group visibility state (shared across all open panels) ----
  var hiddenGroups = {};

  // ---- species highlight state (shared across all open panels) ----
  var speciesHighlightIdx = null;

  function percentile(sortedAsc, p) {
    var idx = (p / 100) * (sortedAsc.length - 1);
    var lo = Math.floor(idx), hi = Math.ceil(idx);
    if (lo === hi) return sortedAsc[lo];
    return sortedAsc[lo] + (sortedAsc[hi] - sortedAsc[lo]) * (idx - lo);
  }

  // Mirrors illuminate_PCA.run_illuminated_PCA's opacity/size formula,
  // including the fact that the 99th-percentile clip (the no_outliers
  // path) is computed per taxonomic group, not globally -- a group made up
  // of mostly low counts shouldn't get washed out by one outlier species
  // in a completely different group.
  function computeAlphaSize(counts, groups, noOutliers) {
    var maxCount = Math.max.apply(null, counts);
    if (!(maxCount > 0)) {
      return counts.map(function () { return { alpha: 0, radius: MIN_RADIUS }; });
    }

    var alphas = counts.map(function () { return 0; });

    if (noOutliers) {
      var byGroup = {};
      groups.forEach(function (g, i) { (byGroup[g] = byGroup[g] || []).push(i); });

      Object.keys(byGroup).forEach(function (g) {
        var idxs = byGroup[g];
        var norm = idxs.map(function (i) { return counts[i] / maxCount; });
        var nonzero = norm.filter(function (n) { return n > 0; }).sort(function (a, b) { return a - b; });
        var p99 = nonzero.length ? percentile(nonzero, 99) : 1.0;
        norm = norm.map(function (n) { return Math.min(n, p99); });
        if (p99 > 0) norm = norm.map(function (n) { return n / p99; });
        norm = norm.map(function (n) { return Math.sqrt(n); });
        idxs.forEach(function (i, k) { alphas[i] = counts[i] === 0 ? 0 : norm[k]; });
      });
    } else {
      var logMax = Math.log1p(maxCount);
      alphas = counts.map(function (c) { return logMax > 0 ? Math.log1p(c) / logMax : 0; });
    }

    return alphas.map(function (a) { return { alpha: a, radius: MIN_RADIUS + a * (MAX_RADIUS - MIN_RADIUS) }; });
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function formatContrib(v) {
    return (v >= 0 ? "+" : "") + v.toFixed(5);
  }

  // ---- species highlight: search finds a species by name/group and marks
  // its dot (bigger radius, amber stroke, drawn on top) in *every* open
  // panel at once -- unlike GO-count illumination, it never touches
  // opacity/visibility of any point (species search is for finding a point,
  // not filtering the view). Every open panel shares the same PC1/PC2
  // layout, so one shared highlight index applies cleanly across all of
  // them, including panels opened after the highlight was set. ----
  function speciesCircleZoomScale(circle) {
    // String-parse the viewBox attribute (rather than svg.viewBox.baseVal)
    // to match how applyViewBox()/updateMarkerScale() already track zoom
    // per panel -- keeps this independent of SVGAnimatedRect support.
    var svgEl = circle.closest("svg");
    var parts = (svgEl.getAttribute("viewBox") || "").split(/\s+/);
    var width = parseFloat(parts[2]) || PLOT_W;
    var ratio = width / PLOT_W;
    return ratio * (1 + MARKER_ZOOM_GROWTH * (1 - ratio));
  }

  // A circle's un-highlighted radius is whatever computeAlphaSize gave it
  // for that node's illumination (not a fixed constant, unlike the
  // single-scatter general_pca templates) -- stashed once at creation
  // (data-plain-r, set in buildPanel) so this can always get back to it.
  function restyleHighlightCircle(circle, highlighted) {
    var scale = speciesCircleZoomScale(circle);
    var plainR = parseFloat(circle.getAttribute("data-plain-r"));
    var baseR = highlighted ? plainR * 2.2 : plainR;
    circle.setAttribute("data-base-r", baseR);
    circle.setAttribute("r", baseR * scale);
    circle.setAttribute("stroke", highlighted ? "#F5A623" : "black");
    circle.setAttribute("stroke-width", BASE_STROKE_WIDTH * scale);
    circle.classList.toggle("species-highlighted", highlighted);
    if (highlighted) circle.parentNode.appendChild(circle); // re-insert -> moves to end -> drawn on top
  }

  function setSpeciesSearchStatus(text, isError) {
    var status = document.getElementById("species-search-status");
    status.textContent = text;
    status.classList.toggle("active", !isError && !!text);
    status.classList.toggle("error", !!isError);
  }

  function clearSpeciesHighlight() {
    if (speciesHighlightIdx !== null) {
      document.querySelectorAll('.panel circle[data-species-idx="' + speciesHighlightIdx + '"]').forEach(function (c) {
        restyleHighlightCircle(c, false);
      });
    }
    speciesHighlightIdx = null;
    setSpeciesSearchStatus("", false);
  }

  function highlightSpecies(idx) {
    if (speciesHighlightIdx === idx) return;
    if (speciesHighlightIdx !== null) {
      document.querySelectorAll('.panel circle[data-species-idx="' + speciesHighlightIdx + '"]').forEach(function (c) {
        restyleHighlightCircle(c, false);
      });
    }
    document.querySelectorAll('.panel circle[data-species-idx="' + idx + '"]').forEach(function (c) {
      restyleHighlightCircle(c, true);
    });
    speciesHighlightIdx = idx;
    var s = DATA.species[idx];
    setSpeciesSearchStatus("Highlighting: " + s.name + " (" + s.group + ")", false);
  }

  var SPECIES_ENTRIES = DATA.species.map(function (s, i) {
    return { name: s.name, group: s.group, idx: i, key: (s.name + " " + s.group).toLowerCase() };
  });
  var SPECIES_SEARCH_MAX_SUGGESTIONS = 20;
  var speciesSearchInput = document.getElementById("species-search-input");
  var speciesSearchSuggestions = document.getElementById("species-search-suggestions");

  function renderSpeciesSuggestions(matches) {
    speciesSearchSuggestions.innerHTML = "";
    if (!matches.length) {
      speciesSearchSuggestions.classList.add("hidden");
      return;
    }
    matches.forEach(function (m) {
      var item = document.createElement("div");
      item.className = "go-suggestion";
      item.innerHTML =
        '<span class="go-suggestion-id">' + escapeHtml(m.name) + "</span>" +
        '<span class="go-suggestion-desc">' + escapeHtml(m.group) + "</span>";
      item.addEventListener("mousedown", function (evt) {
        evt.preventDefault();
        speciesSearchInput.value = m.name;
        speciesSearchSuggestions.classList.add("hidden");
        highlightSpecies(m.idx);
      });
      speciesSearchSuggestions.appendChild(item);
    });
    speciesSearchSuggestions.classList.remove("hidden");
  }

  function findSpeciesMatches(query) {
    var q = query.trim().toLowerCase();
    if (!q) return [];
    var matches = [];
    for (var i = 0; i < SPECIES_ENTRIES.length && matches.length < SPECIES_SEARCH_MAX_SUGGESTIONS; i++) {
      if (SPECIES_ENTRIES[i].key.indexOf(q) !== -1) matches.push(SPECIES_ENTRIES[i]);
    }
    return matches;
  }

  speciesSearchInput.addEventListener("input", function () {
    renderSpeciesSuggestions(findSpeciesMatches(speciesSearchInput.value));
  });

  speciesSearchInput.addEventListener("keydown", function (evt) {
    if (evt.key === "Escape") {
      speciesSearchSuggestions.classList.add("hidden");
      return;
    }
    if (evt.key !== "Enter") return;
    evt.preventDefault();
    var query = speciesSearchInput.value.trim();
    if (!query) return;
    var matches = findSpeciesMatches(query);
    var exact = matches.find(function (m) { return m.name.toLowerCase() === query.toLowerCase(); });
    var target = exact || matches[0];
    speciesSearchSuggestions.classList.add("hidden");
    if (target) {
      speciesSearchInput.value = target.name;
      highlightSpecies(target.idx);
    } else {
      setSpeciesSearchStatus("Species not found: " + query, true);
    }
  });

  document.addEventListener("click", function (evt) {
    if (!document.getElementById("species-search-wrap").contains(evt.target)) {
      speciesSearchSuggestions.classList.add("hidden");
    }
  });

  document.getElementById("species-search-clear-btn").onclick = function () {
    speciesSearchInput.value = "";
    renderSpeciesSuggestions([]);
    clearSpeciesHighlight();
  };

  // ---- species detail modal: click a point to see its top-contributing
  // GO terms per PC (why it sits where it does), reusing the contributions
  // general_pca_abundance.py's compute_species_contributions already
  // computes -- see CONTRIB_GO_DESC above for how descriptions are sourced
  // without the full GO-search payload. ----
  var speciesModal = document.getElementById("species-modal");

  function closeSpeciesModal() {
    speciesModal.classList.add("hidden");
  }

  function openSpeciesModal(s) {

    hideTooltip();

    document.getElementById("modal-species-name").textContent = s.name;
    document.getElementById("modal-species-sub").textContent =
      s.group + "  ·  PC1: " + s.pc1.toFixed(3) + "  PC2: " + s.pc2.toFixed(3);

      section.appendChild(pcLabel);

      [["positive", "▲ Positive", "total_positive"], ["negative", "▼ Negative", "total_negative"]].forEach(function (pair) {
        var key = pair[0], label = pair[1], totalKey = pair[2];
        var entries = s.contributions[pc][key];
        if (!entries || !entries.length) return;

        var total = s.contributions[pc][totalKey];
        var totalStr = (total !== undefined)
          ? "  (total: " + (total >= 0 ? "+" : "") + total.toFixed(3) + ")"
          : "";

        var dirLabel = document.createElement("div");
        dirLabel.className = "modal-direction-label";
        dirLabel.textContent = label + totalStr;

        entries.forEach(function (entry) {

          row.className = "modal-contrib-row";
          row.innerHTML =
            '<span class="modal-contrib-go">' + escapeHtml(entry.go_id) + "</span>" +
            '<span class="modal-contrib-value">' + formatContrib(entry.contribution) + "</span>" +
            '<div class="modal-contrib-desc">' + escapeHtml(goDesc) + "</div>";
          section.appendChild(row);
        });
      });

      body.appendChild(section);
    });

    speciesModal.classList.remove("hidden");

  document.getElementById("modal-close").onclick = closeSpeciesModal;
  speciesModal.querySelector(".modal-backdrop").addEventListener("click", closeSpeciesModal);

  function formatPercent(count, totalProts) {
    if (!(totalProts > 0)) return "n/a";
    var pct = (count / totalProts) * 100;
    return (pct < 0.01 ? pct.toFixed(4) : pct.toFixed(2)) + "%";
  }

  function showTooltip(evt, species, count) {
    var pct = formatPercent(count, species.total_prots);
    tooltip.innerHTML =
      "<b>" + escapeHtml(species.name) + "</b><br>" +
      "Group: " + escapeHtml(species.group) + "<br>" +
      "GO count: " + count + "<br>" +
      "Total proteins: " + Math.round(species.total_prots) + "<br>" +
      "Share of proteome: " + pct;
    tooltip.classList.remove("hidden");
    moveTooltip(evt);
  }

  function moveTooltip(evt) {
    tooltip.style.left = (evt.clientX + 14) + "px";
    tooltip.style.top = (evt.clientY + 14) + "px";
  }

  function hideTooltip() {
    tooltip.classList.add("hidden");
  }

  // A point is hidden if its taxonomic group is toggled off, or its raw
  // GO count falls outside this panel's own [min, max] threshold (each
  // panel keeps its own threshold in its dataset, since a meaningful
  // count range differs wildly between GO terms).
  function isCircleHidden(group, count, panelEl) {
    if (hiddenGroups[group]) return true;
    var minVal = panelEl.dataset.minCount !== "" ? parseFloat(panelEl.dataset.minCount) : null;
    var maxVal = panelEl.dataset.maxCount !== "" ? parseFloat(panelEl.dataset.maxCount) : null;
    if (minVal !== null && !isNaN(minVal) && count < minVal) return true;
    if (maxVal !== null && !isNaN(maxVal) && count > maxVal) return true;
    return false;
  }

  function applyGroupVisibility(panelEl) {
    panelEl.querySelectorAll("circle[data-group]").forEach(function (c) {
      var count = parseFloat(c.getAttribute("data-count"));
      c.style.display = isCircleHidden(c.getAttribute("data-group"), count, panelEl) ? "none" : "";
    });
  }

  function syncLegendCheckboxes() {
    document.querySelectorAll("input[data-group-checkbox]").forEach(function (cb) {
      cb.checked = !hiddenGroups[cb.getAttribute("data-group-checkbox")];
    });
  }

  function refreshAllPanels() {
    document.querySelectorAll(".panel").forEach(applyGroupVisibility);
    syncLegendCheckboxes();
  }

  function setAllGroupsHidden(hidden) {
    DATA.species.forEach(function (s) { hiddenGroups[s.group] = hidden; });
    refreshAllPanels();
  }

  // Built once: every panel shares the same taxon legend/select-all-none,
  // so it lives in the sidebar instead of being rebuilt (and toggled
  // identically) in every single open PCA.
  function buildSidebarLegend() {
    var selectAllBtn = document.getElementById("sidebar-select-all");
    var selectNoneBtn = document.getElementById("sidebar-select-none");
    selectAllBtn.onclick = function () { setAllGroupsHidden(false); };
    selectNoneBtn.onclick = function () { setAllGroupsHidden(true); };

    var legend = document.getElementById("sidebar-legend");
    ALL_GROUPS.forEach(function (g) {
      var label = document.createElement("label");
      var cb = document.createElement("input");
      cb.type = "checkbox";
      cb.setAttribute("data-group-checkbox", g);
      cb.checked = !hiddenGroups[g];
      cb.onchange = function () {
        hiddenGroups[g] = !cb.checked;
        refreshAllPanels();
      };
      var swatch = document.createElement("span");
      swatch.className = "swatch";
      swatch.style.background = DATA.groups[g] || "#999";
      label.appendChild(cb);
      label.appendChild(swatch);
      label.appendChild(document.createTextNode(g));
      legend.appendChild(label);
    });
  }

  // Ranks GO terms by how strongly they drive each PC axis, straight off
  // the fitted PCA model's loadings (see top_loadings_by_pc in
  // interactive_go_tree.py) -- a property of the PCA itself, the same for
  // every node, so it's built once in the sidebar rather than per panel.
  function buildSidebarTopLoadings() {
    var container = document.getElementById("sidebar-top-loadings");
    var pcLabels = { PC1: PC1_LABEL, PC2: PC2_LABEL };

    Object.keys(DATA.top_loadings).forEach(function (pc) {
      var heading = document.createElement("div");
      heading.className = "loading-pc-label";
      heading.textContent = pcLabels[pc] || pc;
      container.appendChild(heading);

      DATA.top_loadings[pc].forEach(function (entry) {
        var row = document.createElement("div");
        row.className = "loading-row";
        row.innerHTML =
          '<span class="loading-go">' + escapeHtml(entry.go_id) + "</span>" +
          '<span class="loading-value">' + formatLoading(entry.loading) + "</span>" +
          '<div class="loading-desc">' + escapeHtml(entry.description) + "</div>";
        container.appendChild(row);
      });
    });
  }

  // Per-panel threshold control: a subtle vertical slider beside the PCA
  // scatter -- drag either handle to move the count floor/ceiling, or type
  // exact values in the small inputs above/below the track. Lives on the
  // panel itself (not a shared sidebar) since a meaningful count range
  // differs wildly between GO terms, and the track height tracks the
  // scatter's own height via flex stretch, not a hardcoded pixel value.
  function buildThresholdRail(panel, maxObservedCount) {
    var trackMax = maxObservedCount > 0 ? maxObservedCount : 1;
    panel.dataset.minCount = "0";
    panel.dataset.maxCount = String(maxObservedCount);

    var rail = document.createElement("div");
    rail.className = "threshold-rail";
    rail.title = "Drag to set this panel's GO-count range";

    var maxInput = document.createElement("input");
    maxInput.type = "number";
    maxInput.min = "0";
    maxInput.className = "threshold-rail-input";
    maxInput.value = maxObservedCount;
    rail.appendChild(maxInput);

    var track = document.createElement("div");
    track.className = "threshold-rail-track";
    var fill = document.createElement("div");
    fill.className = "threshold-rail-fill";
    var minHandle = document.createElement("div");
    minHandle.className = "threshold-rail-handle";
    var maxHandle = document.createElement("div");
    maxHandle.className = "threshold-rail-handle";
    track.appendChild(fill);
    track.appendChild(minHandle);
    track.appendChild(maxHandle);
    rail.appendChild(track);

    var minInput = document.createElement("input");
    minInput.type = "number";
    minInput.min = "0";
    minInput.className = "threshold-rail-input";
    minInput.value = 0;
    rail.appendChild(minInput);

    function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }

    function positionHandles() {
      var minV = clamp(parseFloat(panel.dataset.minCount) || 0, 0, trackMax);
      var maxV = clamp(parseFloat(panel.dataset.maxCount), 0, trackMax);
      var minPct = (minV / trackMax) * 100;
      var maxPct = (maxV / trackMax) * 100;
      minHandle.style.top = (100 - minPct) + "%";
      maxHandle.style.top = (100 - maxPct) + "%";
      fill.style.top = (100 - maxPct) + "%";
      fill.style.height = (maxPct - minPct) + "%";
    }

    function setMin(v) {
      if (isNaN(v)) return;
      v = clamp(Math.round(v), 0, trackMax);
      var maxV = parseFloat(panel.dataset.maxCount);
      if (v > maxV) v = maxV;
      panel.dataset.minCount = String(v);
      minInput.value = v;
      positionHandles();
      applyGroupVisibility(panel);
    }

    function setMax(v) {
      if (isNaN(v)) return;
      v = clamp(Math.round(v), 0, trackMax);
      var minV = parseFloat(panel.dataset.minCount) || 0;
      if (v < minV) v = minV;
      panel.dataset.maxCount = String(v);
      maxInput.value = v;
      positionHandles();
      applyGroupVisibility(panel);
    }

    minInput.oninput = function () { setMin(parseFloat(minInput.value)); };
    maxInput.oninput = function () { setMax(parseFloat(maxInput.value)); };

    function valueFromClientY(clientY) {
      var rect = track.getBoundingClientRect();
      var frac = clamp((rect.bottom - clientY) / rect.height, 0, 1);
      return frac * trackMax;
    }

    function startDrag(setter) {
      return function (evt) {
        evt.preventDefault();
        setter(valueFromClientY(evt.clientY));
        function onMove(e) { setter(valueFromClientY(e.clientY)); }
        function onUp() {
          window.removeEventListener("mousemove", onMove);
          window.removeEventListener("mouseup", onUp);
        }
        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onUp);
      };
    }
    minHandle.addEventListener("mousedown", startDrag(setMin));
    maxHandle.addEventListener("mousedown", startDrag(setMax));
    track.addEventListener("mousedown", function (evt) {
      if (evt.target === minHandle || evt.target === maxHandle) return;
      var v = valueFromClientY(evt.clientY);
      var minV = parseFloat(panel.dataset.minCount) || 0;
      var maxV = parseFloat(panel.dataset.maxCount);
      (Math.abs(v - minV) <= Math.abs(v - maxV) ? setMin : setMax)(v);
    });

    positionHandles();
    return rail;
  }

  var PNG_EXPORT_SCALE = 2;

  function downloadSvgAsPng(svg, width, height, filenameBase) {
    var clone = svg.cloneNode(true);
    clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");

    var outW = Math.round(width * PNG_EXPORT_SCALE);
    var outH = Math.round(height * PNG_EXPORT_SCALE);

    var svgString = new XMLSerializer().serializeToString(clone);
    var svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
    var url = URL.createObjectURL(svgBlob);

    var img = new Image();
    img.onload = function () {
      var canvas = document.createElement("canvas");
      canvas.width = outW;
      canvas.height = outH;
      var ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, outW, outH);
      ctx.drawImage(img, 0, 0, outW, outH);
      URL.revokeObjectURL(url);

      canvas.toBlob(function (blob) {
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = filenameBase + ".png";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }, "image/png");
    };
    img.onerror = function () {
      URL.revokeObjectURL(url);
      window.alert("Could not export this PCA as PNG.");
    };
    img.src = url;
  }

  var LEGEND_ROW_H = 20;
  var LEGEND_SWATCH = 10;
  var LEGEND_GAP = 16;
  var LEGEND_CHAR_PX = 6.3;

  function packLegendRows(legendGroups, rowMaxWidth) {
    var rows = [[]];
    var rowWidth = 0;
    legendGroups.forEach(function (g) {
      var itemWidth = LEGEND_SWATCH + 4 + g.length * LEGEND_CHAR_PX + LEGEND_GAP;
      if (rowWidth + itemWidth > rowMaxWidth && rows[rows.length - 1].length > 0) {
        rows.push([]);
        rowWidth = 0;
      }
      rows[rows.length - 1].push({ name: g, width: itemWidth });
      rowWidth += itemWidth;
    });
    return rows;
  }

  function appendLegendRows(svgNS, parentSvg, rows, originX, originY) {
    rows.forEach(function (row, rowIdx) {
      var x = originX;
      var y = originY + rowIdx * LEGEND_ROW_H + LEGEND_ROW_H / 2;
      row.forEach(function (item) {
        var swatch = document.createElementNS(svgNS, "circle");
        swatch.setAttribute("cx", x + LEGEND_SWATCH / 2);
        swatch.setAttribute("cy", y);
        swatch.setAttribute("r", LEGEND_SWATCH / 2);
        swatch.setAttribute("fill", DATA.groups[item.name] || "#999");
        swatch.setAttribute("stroke", "black");
        swatch.setAttribute("stroke-width", "0.5");
        parentSvg.appendChild(swatch);

        var label = document.createElementNS(svgNS, "text");
        label.setAttribute("x", x + LEGEND_SWATCH + 4);
        label.setAttribute("y", y + 4);
        label.setAttribute("font-family", "Arial, Helvetica, sans-serif");
        label.setAttribute("font-size", "11");
        label.setAttribute("fill", "#1a1a1a");
        label.textContent = item.name;
        parentSvg.appendChild(label);

        x += item.width;
      });
    });
  }

  // Composes a standalone SVG (title, plot, axis labels, legend) around a
  // clone of the live scatter SVG, so the exported PNG carries the same
  // context as the on-screen panel instead of just bare dots.
  function buildExportSvg(node, liveSvg, legendGroups) {
    var svgNS = "http://www.w3.org/2000/svg";
    var MARGIN = 14;
    var TITLE_H = 26;
    var Y_LABEL_W = 18;
    var X_LABEL_H = 20;

    var rows = packLegendRows(legendGroups, Y_LABEL_W + PLOT_W);
    var legendH = rows.length * LEGEND_ROW_H;

    var totalW = MARGIN * 2 + Y_LABEL_W + PLOT_W;
    var totalH = MARGIN * 2 + TITLE_H + PLOT_H + X_LABEL_H + legendH;

    var exportSvg = document.createElementNS(svgNS, "svg");
    exportSvg.setAttribute("width", totalW);
    exportSvg.setAttribute("height", totalH);
    exportSvg.setAttribute("viewBox", "0 0 " + totalW + " " + totalH);

    var bg = document.createElementNS(svgNS, "rect");
    bg.setAttribute("x", 0); bg.setAttribute("y", 0);
    bg.setAttribute("width", totalW); bg.setAttribute("height", totalH);
    bg.setAttribute("fill", "#ffffff");
    exportSvg.appendChild(bg);

    var title = document.createElementNS(svgNS, "text");
    title.setAttribute("x", totalW / 2);
    title.setAttribute("y", MARGIN + 16);
    title.setAttribute("text-anchor", "middle");
    title.setAttribute("font-family", "Arial, Helvetica, sans-serif");
    title.setAttribute("font-size", "14");
    title.setAttribute("font-weight", "bold");
    title.textContent = node.go_id + " — " + node.description + " (IC " + formatIc(node.ic) + ")";
    exportSvg.appendChild(title);

    var plotSvg = liveSvg.cloneNode(true);
    plotSvg.removeAttribute("class");
    plotSvg.setAttribute("width", PLOT_W);
    plotSvg.setAttribute("height", PLOT_H);
    plotSvg.setAttribute("x", MARGIN + Y_LABEL_W);
    plotSvg.setAttribute("y", MARGIN + TITLE_H);
    exportSvg.appendChild(plotSvg);

    var yLabel = document.createElementNS(svgNS, "text");
    var yLabelX = MARGIN + 10;
    var yLabelY = MARGIN + TITLE_H + PLOT_H / 2;
    yLabel.setAttribute("transform", "translate(" + yLabelX + "," + yLabelY + ") rotate(-90)");
    yLabel.setAttribute("text-anchor", "middle");
    yLabel.setAttribute("font-family", "Arial, Helvetica, sans-serif");
    yLabel.setAttribute("font-size", "11");
    yLabel.setAttribute("fill", "#555");
    yLabel.textContent = PC2_LABEL;
    exportSvg.appendChild(yLabel);

    var xLabel = document.createElementNS(svgNS, "text");
    xLabel.setAttribute("x", MARGIN + Y_LABEL_W + PLOT_W / 2);
    xLabel.setAttribute("y", MARGIN + TITLE_H + PLOT_H + 14);
    xLabel.setAttribute("text-anchor", "middle");
    xLabel.setAttribute("font-family", "Arial, Helvetica, sans-serif");
    xLabel.setAttribute("font-size", "11");
    xLabel.setAttribute("fill", "#555");
    xLabel.textContent = PC1_LABEL;
    exportSvg.appendChild(xLabel);

    appendLegendRows(svgNS, exportSvg, rows, MARGIN + Y_LABEL_W, MARGIN + TITLE_H + PLOT_H + X_LABEL_H);

    return { svg: exportSvg, width: totalW, height: totalH };
  }

  // Same fields as the point tooltip, one species per row, limited to
  // species currently visible in this panel -- i.e. respecting both its
  // taxon-group toggles and its own min/max GO-count threshold -- so the
  // download always matches what's actually shown on screen.
  function downloadPanelTsv(node, panel, countArr) {
    function tsvField(v) {
      return String(v).replace(/[\t\r\n]+/g, " ");
    }

    var rows = [["Species", "Group", "GO_count", "Total_proteins", "Share_of_proteome"]];
    DATA.species.forEach(function (s, i) {
      var count = countArr[i];
      if (count === 0) return;
      if (isCircleHidden(s.group, count, panel)) return;
      rows.push([
        tsvField(s.name),
        tsvField(s.group),
        String(count),
        String(Math.round(s.total_prots)),
        formatPercent(count, s.total_prots)
      ]);
    });

    var tsv = rows.map(function (r) { return r.join("\t"); }).join("\n") + "\n";
    var blob = new Blob([tsv], { type: "text/tab-separated-values;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "illuminated_pca_" + node.go_id.replace(":", "_") + ".tsv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function buildPanel(node) {
    var panel = document.createElement("div");
    panel.className = "panel";

    var header = document.createElement("div");
    header.className = "panel-header";
    header.innerHTML =
      "<h3>" + escapeHtml(node.go_id) + " &mdash; " + escapeHtml(node.description) +
      " <span class=\"ic-tag\">(IC " + formatIc(node.ic) + ")</span></h3>";

    var headerButtons = document.createElement("div");
    headerButtons.className = "panel-header-buttons";

    var resetBtn = document.createElement("button");
    resetBtn.className = "panel-reset";
    resetBtn.textContent = "Reset zoom";
    headerButtons.appendChild(resetBtn);

    var downloadBtn = document.createElement("button");
    downloadBtn.className = "panel-reset";
    downloadBtn.textContent = "Download PNG";
    headerButtons.appendChild(downloadBtn);

    var downloadTsvBtn = document.createElement("button");
    downloadTsvBtn.className = "panel-reset";
    downloadTsvBtn.textContent = "Download TSV";
    headerButtons.appendChild(downloadTsvBtn);

    var closeBtn = document.createElement("button");
    closeBtn.className = "panel-close";
    closeBtn.textContent = "✕";
    closeBtn.onclick = function () { toggleNode(node.go_id); };
    headerButtons.appendChild(closeBtn);

    header.appendChild(headerButtons);
    panel.appendChild(header);

    var counts = DATA.counts[node.go_id] || {};
    var countArr = DATA.species.map(function (_, i) { return counts[String(i)] || 0; });
    var groupArr = DATA.species.map(function (s) { return s.group; });
    var styles = computeAlphaSize(countArr, groupArr, DATA.meta.no_outliers);
    var maxObservedCount = Math.max.apply(null, countArr);

    var rail = buildThresholdRail(panel, maxObservedCount);

    downloadTsvBtn.onclick = function () {
      downloadPanelTsv(node, panel, countArr);
    };

    var svgNS = "http://www.w3.org/2000/svg";
    var svg = document.createElementNS(svgNS, "svg");
    svg.classList.add("scatter");

    var viewBox = { x: 0, y: 0, w: PLOT_W, h: PLOT_H };
    function applyViewBox() {
      svg.setAttribute("viewBox", viewBox.x + " " + viewBox.y + " " + viewBox.w + " " + viewBox.h);
    }
    applyViewBox();

    // Counter-scale every marker's radius/stroke by how far we've zoomed
    // (viewBox.w shrinking relative to PLOT_W), so each dot keeps roughly
    // (not perfectly -- see MARKER_ZOOM_GROWTH) a constant on-screen pixel
    // size instead of growing in lockstep with the zoom -- see the
    // MIN_VIEW_FRACTION comment for why that's what actually separates a
    // tight cluster of points as you zoom into it.
    function updateMarkerScale() {
      var ratio = viewBox.w / PLOT_W;
      var scale = ratio * (1 + MARKER_ZOOM_GROWTH * (1 - ratio));
      svg.querySelectorAll("circle[data-base-r]").forEach(function (c) {
        c.setAttribute("r", parseFloat(c.getAttribute("data-base-r")) * scale);
        c.setAttribute("stroke-width", BASE_STROKE_WIDTH * scale);
      });
    }

    resetBtn.onclick = function () {
      viewBox.x = 0; viewBox.y = 0; viewBox.w = PLOT_W; viewBox.h = PLOT_H;
      applyViewBox();
      updateMarkerScale();
    };

    downloadBtn.onclick = function () {
      var built = buildExportSvg(node, svg, ALL_GROUPS);
      downloadSvgAsPng(built.svg, built.width, built.height, "illuminated_pca_" + node.go_id.replace(":", "_"));
    };

    var minViewW = PLOT_W * MIN_VIEW_FRACTION;
    svg.addEventListener("wheel", function (evt) {
      evt.preventDefault();
      var rect = svg.getBoundingClientRect();
      var mx = (evt.clientX - rect.left) / rect.width;
      var my = (evt.clientY - rect.top) / rect.height;
      var pointX = viewBox.x + mx * viewBox.w;
      var pointY = viewBox.y + my * viewBox.h;
      var factor = evt.deltaY > 0 ? 1.15 : (1 / 1.15);
      var newW = Math.min(PLOT_W, Math.max(minViewW, viewBox.w * factor));
      var newH = newW * (PLOT_H / PLOT_W);
      viewBox.x = pointX - mx * newW;
      viewBox.y = pointY - my * newH;
      viewBox.w = newW;
      viewBox.h = newH;
      applyViewBox();
      updateMarkerScale();
    }, { passive: false });

    var isPanning = false, panMoved = false, panStart = null;
    svg.addEventListener("mousedown", function (evt) {
      isPanning = true;
      panMoved = false;
      panStart = { x: evt.clientX, y: evt.clientY, vbX: viewBox.x, vbY: viewBox.y };
      svg.classList.add("panning");
      hideTooltip();
      evt.preventDefault();
    });
    window.addEventListener("mousemove", function (evt) {
      if (!isPanning) return;
      panMoved = true;
      var rect = svg.getBoundingClientRect();
      var dx = (evt.clientX - panStart.x) / rect.width * viewBox.w;
      var dy = (evt.clientY - panStart.y) / rect.height * viewBox.h;
      viewBox.x = panStart.vbX - dx;
      viewBox.y = panStart.vbY - dy;
      applyViewBox();
    });
    window.addEventListener("mouseup", function () {
      isPanning = false;
      svg.classList.remove("panning");
    });

    function styleAxisLine(line) {
      line.setAttribute("class", "axis-line");
      line.setAttribute("stroke", "#9ca3af");
      line.setAttribute("stroke-dasharray", "4 3");
      line.setAttribute("stroke-width", "1");
    }

    var axisX = document.createElementNS(svgNS, "line");
    axisX.setAttribute("x1", 0); axisX.setAttribute("x2", PLOT_W);
    axisX.setAttribute("y1", scaleY(0)); axisX.setAttribute("y2", scaleY(0));
    styleAxisLine(axisX);
    svg.appendChild(axisX);

    var axisY = document.createElementNS(svgNS, "line");
    axisY.setAttribute("y1", 0); axisY.setAttribute("y2", PLOT_H);
    axisY.setAttribute("x1", scaleX(0)); axisY.setAttribute("x2", scaleX(0));
    styleAxisLine(axisY);
    svg.appendChild(axisY);

    DATA.species.forEach(function (s, i) {
      // Zero-count species must be fully absent, not just an invisible
      // fill with a visible stroke outline left behind.
      if (countArr[i] === 0) return;

      var c = document.createElementNS(svgNS, "circle");
      c.setAttribute("cx", scaleX(s.pc1));
      c.setAttribute("cy", scaleY(s.pc2));
      c.setAttribute("r", styles[i].radius);
      c.setAttribute("data-base-r", styles[i].radius);
      c.setAttribute("data-plain-r", styles[i].radius);
      c.setAttribute("fill", DATA.groups[s.group] || "#999");
      c.setAttribute("opacity", styles[i].alpha);
      c.setAttribute("stroke", "black");
      c.setAttribute("stroke-width", BASE_STROKE_WIDTH);
      c.setAttribute("data-group", s.group);
      c.setAttribute("data-count", countArr[i]);
      c.setAttribute("data-species-idx", i);
      c.style.display = isCircleHidden(s.group, countArr[i], panel) ? "none" : "";
      c.addEventListener("mouseenter", function (evt) { if (!isPanning) showTooltip(evt, s, countArr[i]); });
      c.addEventListener("mousemove", function (evt) { if (!isPanning) moveTooltip(evt); });
      c.addEventListener("mouseleave", hideTooltip);
      c.addEventListener("mouseup", function () { if (!panMoved) openSpeciesModal(s); });
      svg.appendChild(c);
      // A search picked earlier extends to every panel opened afterwards
      // too, not just the ones already open at the time.
      if (speciesHighlightIdx === i) restyleHighlightCircle(c, true);
    });

    var plotRow = document.createElement("div");
    plotRow.className = "plot-row";
    var yLabel = document.createElement("div");
    yLabel.className = "axis-label-y";
    yLabel.innerHTML = "<span>" + escapeHtml(PC2_LABEL) + "</span>";
    plotRow.appendChild(yLabel);
    plotRow.appendChild(svg);
    plotRow.appendChild(rail);
    panel.appendChild(plotRow);

    var xLabel = document.createElement("div");
    xLabel.className = "axis-label-x";
    xLabel.textContent = PC1_LABEL;
    panel.appendChild(xLabel);

    var hint = document.createElement("div");
    hint.className = "panel-hint";
    hint.textContent = "Scroll to zoom, drag to pan.";
    panel.appendChild(hint);

    return panel;
  }

  var openNodes = {};
  var openPanelElements = {};

  function cssEscape(s) {
    return s.replace(/[:"\\]/g, "\\$&");
  }

  // Panels expand right under their own node's row, in that level's
  // panel-zone -- so a PCA always opens "in the tree", next to its GO,
  // not in some unrelated area of the page. Multiple panels opened from
  // the same level share that level's zone, side by side on one row
  // (shrinking via CSS, never wrapping onto a second row -- #tree-container
  // scrolls horizontally instead), keeping that level's row order intact;
  // opening a panel pushes the levels below it down, same as any inline
  // accordion.
  function toggleNode(goId) {
    var box = document.querySelector('.node-box[data-go-id="' + cssEscape(goId) + '"]');
    var zone = box.closest(".level-row").querySelector(".panel-zone");

    if (openNodes[goId]) {
      delete openNodes[goId];
      box.classList.remove("expanded");
      openPanelElements[goId].remove();
      delete openPanelElements[goId];
    } else {
      openNodes[goId] = true;
      box.classList.add("expanded");
      var panel = buildPanel(nodesById[goId]);
      panel.setAttribute("data-panel-for", goId);
      openPanelElements[goId] = panel;
      zone.appendChild(panel);

      var siblings = Array.prototype.slice.call(zone.children);
      siblings.sort(function (a, b) { return a.getAttribute("data-panel-for").localeCompare(b.getAttribute("data-panel-for")); });
      siblings.forEach(function (el) { zone.appendChild(el); });
    }
    requestAnimationFrame(drawConnectors);
  }

  function expandAll() {
    DATA.tree.nodes.forEach(function (n) {
      if (!openNodes[n.go_id]) toggleNode(n.go_id);
    });
  }

  function collapseAll() {
    Object.keys(openNodes).slice().forEach(function (goId) { toggleNode(goId); });
  }

  // Shared geometry for a parent/child edge: an elbow from the bottom of
  // whichever box is visually higher to the top of whichever is lower,
  // in coordinates relative to #tree-container. Used both by the live
  // connector overlay and the full-tree PNG export, so they never drift
  // apart.
  function computeEdgeElbow(edge, containerRect) {
    var elA = document.querySelector('.node-box[data-go-id="' + cssEscape(edge[0]) + '"]');
    var elB = document.querySelector('.node-box[data-go-id="' + cssEscape(edge[1]) + '"]');
    if (!elA || !elB) return null;

    var rectA = elA.getBoundingClientRect();
    var rectB = elB.getBoundingClientRect();
    var upper = rectA.top < rectB.top ? rectA : rectB;
    var lower = rectA.top < rectB.top ? rectB : rectA;

    var x1 = upper.left + upper.width / 2 - containerRect.left + container.scrollLeft;
    var y1 = upper.bottom - containerRect.top + container.scrollTop;
    var x2 = lower.left + lower.width / 2 - containerRect.left + container.scrollLeft;
    var y2 = lower.top - containerRect.top + container.scrollTop;
    return { x1: x1, y1: y1, x2: x2, y2: y2, midY: (y1 + y2) / 2 };
  }

  function drawConnectors() {
    overlay.setAttribute("width", container.scrollWidth);
    overlay.setAttribute("height", container.scrollHeight);
    overlay.style.width = container.scrollWidth + "px";
    overlay.style.height = container.scrollHeight + "px";
    overlay.innerHTML = "";

    var containerRect = container.getBoundingClientRect();
    var svgNS = "http://www.w3.org/2000/svg";

    DATA.tree.edges.forEach(function (edge) {
      var e = computeEdgeElbow(edge, containerRect);
      if (!e) return;

      var path = document.createElementNS(svgNS, "path");
      path.setAttribute("d", "M " + e.x1 + " " + e.y1 + " L " + e.x1 + " " + e.midY + " L " + e.x2 + " " + e.midY + " L " + e.x2 + " " + e.y2);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", "#94a3b8");
      path.setAttribute("stroke-width", "1.2");
      overlay.appendChild(path);
    });
  }

  function buildTree() {
    var nodesByLevel = {};
    DATA.tree.nodes.forEach(function (n) {
      (nodesByLevel[n.level] = nodesByLevel[n.level] || []).push(n);
    });

    var levelKeys = Object.keys(nodesByLevel).map(Number);
    levelKeys.sort(function (a, b) { return DATA.meta.mode === "ancestors" ? b - a : a - b; });

    levelKeys.forEach(function (level) {
      var rowWrap = document.createElement("div");
      rowWrap.className = "level-row";

      var nodeRow = document.createElement("div");
      nodeRow.className = "node-row";

      var nodes = nodesByLevel[level].slice().sort(function (a, b) { return a.go_id.localeCompare(b.go_id); });
      nodes.forEach(function (n) {
        var box = document.createElement("div");
        box.className = "node-box" + (n.is_root ? " root" : "");
        box.setAttribute("data-go-id", n.go_id);
        box.innerHTML =
          '<div class="go-id">' + escapeHtml(n.go_id) + "</div>" +
          '<div class="go-desc">' + escapeHtml(n.description) + "</div>" +
          '<div class="go-ic">IC ' + formatIc(n.ic) + "</div>";
        box.addEventListener("click", function () { toggleNode(n.go_id); });
        nodeRow.appendChild(box);
      });

      var panelZone = document.createElement("div");
      panelZone.className = "panel-zone";

      rowWrap.appendChild(nodeRow);
      rowWrap.appendChild(panelZone);
      container.appendChild(rowWrap);
    });
  }

  // Builds a static <g> with one rect+text per node box and one elbow
  // path per edge, read straight off the live tree's current positions --
  // used only for the full-tree PNG export.
  function buildTreeBoxesAndConnectors(svgNS) {
    var g = document.createElementNS(svgNS, "g");
    var containerRect = container.getBoundingClientRect();

    document.querySelectorAll(".node-box").forEach(function (box) {
      var node = nodesById[box.getAttribute("data-go-id")];
      var rect = box.getBoundingClientRect();
      var x = rect.left - containerRect.left + container.scrollLeft;
      var y = rect.top - containerRect.top + container.scrollTop;

      var r = document.createElementNS(svgNS, "rect");
      r.setAttribute("x", x); r.setAttribute("y", y);
      r.setAttribute("width", rect.width); r.setAttribute("height", rect.height);
      r.setAttribute("rx", 6);
      r.setAttribute("fill", node.is_root ? "#ffffcc" : "#6FACE8");
      r.setAttribute("stroke", node.is_root ? "#d4d400" : "#94a3b8");
      g.appendChild(r);

      var idText = document.createElementNS(svgNS, "text");
      idText.setAttribute("x", x + 10);
      idText.setAttribute("y", y + 17);
      idText.setAttribute("font-family", "Arial, Helvetica, sans-serif");
      idText.setAttribute("font-size", "12");
      idText.setAttribute("font-weight", "600");
      idText.textContent = node.go_id;
      g.appendChild(idText);

      var descText = document.createElementNS(svgNS, "text");
      descText.setAttribute("x", x + 10);
      descText.setAttribute("y", y + 31);
      descText.setAttribute("font-family", "Arial, Helvetica, sans-serif");
      descText.setAttribute("font-size", "10");
      descText.setAttribute("fill", "#1f2937");
      var desc = node.description;
      descText.textContent = desc.length > 28 ? desc.slice(0, 27) + "…" : desc;
      g.appendChild(descText);

      var icText = document.createElementNS(svgNS, "text");
      icText.setAttribute("x", x + 10);
      icText.setAttribute("y", y + rect.height - 8);
      icText.setAttribute("font-family", "Arial, Helvetica, sans-serif");
      icText.setAttribute("font-size", "9");
      icText.setAttribute("fill", "#475569");
      icText.textContent = "IC " + formatIc(node.ic);
      g.appendChild(icText);
    });

    DATA.tree.edges.forEach(function (edge) {
      var e = computeEdgeElbow(edge, containerRect);
      if (!e) return;
      var path = document.createElementNS(svgNS, "path");
      path.setAttribute("d", "M " + e.x1 + " " + e.y1 + " L " + e.x1 + " " + e.midY + " L " + e.x2 + " " + e.midY + " L " + e.x2 + " " + e.y2);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", "#94a3b8");
      path.setAttribute("stroke-width", "1.2");
      g.appendChild(path);
    });

    return g;
  }

  // Snapshots every currently open panel exactly where it already sits
  // (header text, the live plot at its live size, axis labels), all read
  // from their live rects -- so the tree export shows PCAs expanded in
  // place, matching the on-screen page instead of a separately-laid-out
  // grid.
  function buildOpenPanelsSnapshot(svgNS, containerRect) {
    var g = document.createElementNS(svgNS, "g");

    Object.keys(openPanelElements).forEach(function (goId) {
      var panelEl = openPanelElements[goId];
      var node = nodesById[goId];
      var panelRect = panelEl.getBoundingClientRect();
      var px = panelRect.left - containerRect.left + container.scrollLeft;
      var py = panelRect.top - containerRect.top + container.scrollTop;

      var card = document.createElementNS(svgNS, "rect");
      card.setAttribute("x", px); card.setAttribute("y", py);
      card.setAttribute("width", panelRect.width); card.setAttribute("height", panelRect.height);
      card.setAttribute("rx", 8);
      card.setAttribute("fill", "#ffffff");
      card.setAttribute("stroke", "#cbd5e1");
      g.appendChild(card);

      var headerEl = panelEl.querySelector(".panel-header h3");
      var headerRect = headerEl.getBoundingClientRect();
      var headerText = document.createElementNS(svgNS, "text");
      headerText.setAttribute("x", headerRect.left - containerRect.left + container.scrollLeft);
      headerText.setAttribute("y", headerRect.top - containerRect.top + container.scrollTop + headerRect.height / 2 + 4);
      headerText.setAttribute("font-family", "Arial, Helvetica, sans-serif");
      headerText.setAttribute("font-size", "13");
      headerText.setAttribute("font-weight", "bold");
      headerText.textContent = node.go_id + " — " + node.description + " (IC " + formatIc(node.ic) + ")";
      g.appendChild(headerText);

      var liveSvg = panelEl.querySelector("svg.scatter");
      var svgRect = liveSvg.getBoundingClientRect();
      var plotClone = liveSvg.cloneNode(true);
      plotClone.removeAttribute("class");
      plotClone.setAttribute("width", svgRect.width);
      plotClone.setAttribute("height", svgRect.height);
      plotClone.setAttribute("x", svgRect.left - containerRect.left + container.scrollLeft);
      plotClone.setAttribute("y", svgRect.top - containerRect.top + container.scrollTop);
      g.appendChild(plotClone);

      var yLabelSpan = panelEl.querySelector(".axis-label-y span");
      if (yLabelSpan) {
        var yr = yLabelSpan.getBoundingClientRect();
        var yx = yr.left - containerRect.left + container.scrollLeft + yr.width / 2;
        var yy = yr.top - containerRect.top + container.scrollTop + yr.height / 2;
        var yText = document.createElementNS(svgNS, "text");
        yText.setAttribute("transform", "translate(" + yx + "," + yy + ") rotate(-90)");
        yText.setAttribute("text-anchor", "middle");
        yText.setAttribute("font-family", "Arial, Helvetica, sans-serif");
        yText.setAttribute("font-size", "10");
        yText.setAttribute("fill", "#555");
        yText.textContent = yLabelSpan.textContent;
        g.appendChild(yText);
      }

      var xLabelEl = panelEl.querySelector(".axis-label-x");
      if (xLabelEl) {
        var xr = xLabelEl.getBoundingClientRect();
        var xText = document.createElementNS(svgNS, "text");
        xText.setAttribute("x", xr.left - containerRect.left + container.scrollLeft + xr.width / 2);
        xText.setAttribute("y", xr.top - containerRect.top + container.scrollTop + xr.height / 2 + 4);
        xText.setAttribute("text-anchor", "middle");
        xText.setAttribute("font-family", "Arial, Helvetica, sans-serif");
        xText.setAttribute("font-size", "10");
        xText.setAttribute("fill", "#555");
        xText.textContent = xLabelEl.textContent;
        g.appendChild(xText);
      }
    });

    return g;
  }

  function downloadFullTreePng() {
    var svgNS = "http://www.w3.org/2000/svg";
    var MARGIN = 20;
    var containerRect = container.getBoundingClientRect();

    var treeW = container.scrollWidth;
    var treeH = container.scrollHeight;

    var legendRows = packLegendRows(ALL_GROUPS, treeW);
    var legendH = ALL_GROUPS.length ? legendRows.length * LEGEND_ROW_H + 10 : 0;

    var masterW = treeW + MARGIN * 2;
    var masterH = treeH + legendH + MARGIN * 2;

    var masterSvg = document.createElementNS(svgNS, "svg");
    masterSvg.setAttribute("width", masterW);
    masterSvg.setAttribute("height", masterH);
    masterSvg.setAttribute("viewBox", "0 0 " + masterW + " " + masterH);

    var bg = document.createElementNS(svgNS, "rect");
    bg.setAttribute("x", 0); bg.setAttribute("y", 0);
    bg.setAttribute("width", masterW); bg.setAttribute("height", masterH);
    bg.setAttribute("fill", "#ffffff");
    masterSvg.appendChild(bg);

    var contentGroup = document.createElementNS(svgNS, "g");
    contentGroup.setAttribute("transform", "translate(" + MARGIN + "," + MARGIN + ")");
    contentGroup.appendChild(buildTreeBoxesAndConnectors(svgNS));
    contentGroup.appendChild(buildOpenPanelsSnapshot(svgNS, containerRect));
    masterSvg.appendChild(contentGroup);

    appendLegendRows(svgNS, masterSvg, legendRows, MARGIN, treeH + MARGIN + 10);

    downloadSvgAsPng(masterSvg, masterW, masterH, "go_tree_" + DATA.meta.root.replace(":", "_"));
  }

  document.getElementById("expand-all-btn").onclick = expandAll;
  document.getElementById("collapse-all-btn").onclick = collapseAll;
  document.getElementById("download-tree-btn").onclick = downloadFullTreePng;

  buildSidebarLegend();
  buildSidebarTopLoadings();
  buildTree();
  requestAnimationFrame(drawConnectors);
  window.addEventListener("resize", function () { requestAnimationFrame(drawConnectors); });
})();
</script>
</body>
</html>
